# Preview stack for Carta Digital Tauras.
# Fully isolated from Reservas Tauras: distinct project name, distinct port,
# distinct database and volume. Reservas production owns 3330 and MUST NOT be
# touched. Postgres is NEVER published to the host in production; the app talks
# to it over the internal compose network at db:5432.
name: swcartadigitaltauras_preview

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: swcartadigitaltauras-preview:local
    depends_on:
      db:
        condition: service_healthy
      # Block startup until schema migrations have been applied successfully.
      migrate:
        condition: service_completed_successfully
    ports:
      # Host WEB_PORT (default 3331) -> container 3331. Never 3330.
      - "${WEB_PORT:-3331}:3331"
    environment:
      NODE_ENV: production
      PORT: "3331"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-cartadigital}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cartadigital}?schema=public"
      SESSION_SECRET: "${SESSION_SECRET:?set SESSION_SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:?set ADMIN_EMAIL}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH:?set ADMIN_PASSWORD_HASH}"
    restart: unless-stopped

  # One-shot: applies pending Prisma migrations (`prisma migrate deploy`) once
  # the database is healthy, then exits. `web` waits for it to complete. This
  # NEVER seeds — production data is never overwritten by the stack.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    image: swcartadigitaltauras-migrate:local
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-cartadigital}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cartadigital}?schema=public"
    restart: "no"

  db:
    image: postgres:18-alpine
    # No published ports in production — internal-only on the compose network.
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-cartadigital}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-cartadigital}"
    volumes:
      # Postgres 18+ stores data in a version subdirectory, so the mount goes at
      # /var/lib/postgresql (not /var/lib/postgresql/data). See docker-library/postgres#1259.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cartadigital} -d ${POSTGRES_DB:-cartadigital}"]
      interval: 5s
      timeout: 5s
      retries: 10
      # Ignore the brief bootstrap window where PG18 answers on a temporary
      # server, so `web` never starts against a not-yet-ready database.
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
